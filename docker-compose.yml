services:
  db:
    image: mysql:8.0
    container_name: primo-db
    restart: unless-stopped

    env_file:
      - .env

    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

    ports:
      - "3307:${DB_PORT}"

    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .

    command: python manage.py runserver 0.0.0.0:8000
    container_name: primo-web

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

