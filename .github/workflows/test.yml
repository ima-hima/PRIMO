name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-react:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/tree-view-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/tree-view-app/package-lock.json
      - run: npm install --legacy-peer-deps
      - run: CI=true npm test

  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: nyceporg_primo3
          MYSQL_USER: nyceporg_primo
          MYSQL_PASSWORD: primo_ci_password
          MYSQL_ROOT_PASSWORD: primo_ci_root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        run: pip install -r requirements/requirements.txt

      - name: Grant test database privileges
        run: mysql -h 127.0.0.1 -u root -pprimo_ci_root_password -e "GRANT ALL PRIVILEGES ON \`test_%\`.* TO 'nyceporg_primo'@'%'; FLUSH PRIVILEGES;"

      - name: Run tests
        env:
          DB_NAME: nyceporg_primo3
          DB_USER: nyceporg_primo
          DB_PASSWORD: primo_ci_password
          DB_ROOT_PASSWORD: primo_ci_root_password
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          SECRET_KEY: ci-secret-key-not-used-in-production
          DJANGO_ALLOWED_HOSTS: localhost
          DEBUG: "false"
        run: python manage.py test web.tests --noinput
